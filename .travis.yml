before_install: openssl aes-256-cbc -K $encrypted_ef7bff34d55e_key -iv $encrypted_ef7bff34d55e_iv -in github_deploy_key.enc -out github_deploy_key -d
language: node_js
node_js:
  - 8
script: npm run build
deploy:
  local_dir: '/dist'
  provider: pages
  skip_cleanup: true
  github_token: '$github_deploy_key'
  keep_history: false
  on:
    branch: master
