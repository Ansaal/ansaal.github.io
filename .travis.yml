before_install: openssl aes-256-cbc -K $encrypted_73bf8bd570f5_key -iv $encrypted_73bf8bd570f5_iv -in github_travis.enc -out github_travis -d
language: node_js
node_js:
  - 8
cache:
  directories: node_modules
script: npm run build
deploy:
  local_dir: '/dist'
  provider: pages
  skip_cleanup: true
  github_token: '$encrypted_73bf8bd570f5_key'
  keep_history: false
  on:
    branch: master
